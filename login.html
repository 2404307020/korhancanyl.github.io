<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Öğrenci Girişi - Atatürk İlkokulu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1>Atatürk İlkokulu</h1>
        <nav>
          <a href="index.html">Ana Sayfa</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card form-card">
        <h2>Öğrenci Girişi</h2>
        <form id="loginForm">
          <label for="studentId">Öğrenci No</label>
          <input id="studentId" name="studentId" type="text" placeholder="Öğrenci numaranız" required />

          <label for="password">Şifre</label>
          <input id="password" name="password" type="password" placeholder="Şifre" required />

          <button type="submit" class="btn">Giriş Yap</button>
        </form>
        <p class="muted">Not: Bu örnek demo amaçlıdır, gerçek kimlik doğrulama içermez.</p>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
